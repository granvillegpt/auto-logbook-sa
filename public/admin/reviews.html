<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b7285" />
  <title>Admin – Review moderation | Auto Logbook SA</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="icon" type="image/x-icon" href="/assets/logos/favicon.ico" sizes="32x32" />
  <link rel="manifest" href="admin.webmanifest" />
  <style>
    .admin-header { padding: 16px 24px; background: var(--teal, #0b7285); color: #fff; margin-bottom: 24px; }
    .admin-header a { color: #fff; text-decoration: underline; }
    .admin-container { max-width: 720px; margin: 0 auto; padding: 0 24px; }
    .admin-list { display: flex; flex-direction: column; gap: 16px; }
    .admin-card { background: var(--card); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .admin-card .review-stars { font-size: 1.1rem; letter-spacing: 2px; color: #c9a227; margin-bottom: 8px; }
    .admin-card .review-comment { margin: 0 0 8px; line-height: 1.5; font-size: 0.95rem; }
    .admin-card .review-meta { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px; }
    .admin-actions { display: flex; gap: 12px; margin-top: 12px; }
    .admin-actions button { padding: 8px 16px; border-radius: var(--radius); font-weight: 600; cursor: pointer; border: none; }
    .btn-approve { background: #0b7285; color: #fff; }
    .btn-reject { background: #e2e8f0; color: var(--text); }
    .btn-delete { background: #fef2f2; color: #b91c1c; }
    .admin-empty { color: var(--text-muted); margin-top: 16px; }
    .admin-section { margin-bottom: 32px; }
    .review-status {
      font-size: 13px;
      margin-top: 6px;
      font-weight: 600;
    }
    .review-status.approved { color: #16a34a; }
    .review-status.pending { color: #f59e0b; }
    .review-status.rejected { color: #ef4444; }
  </style>
</head>
<body>
  <header class="admin-header">
    <div class="admin-container" style="padding: 0;">
      <a href="../index.html">← Back to site</a>
      <h1 style="margin: 8px 0 0; font-size: 1.25rem;">Review moderation</h1>
    </div>
  </header>
  <main class="admin-container">
    <h2>Pending Reviews (<span id="pendingCount">0</span>)</h2>
    <div id="pendingReviews" class="admin-list"></div>

    <h2>Approved Reviews (<span id="approvedCount">0</span>)</h2>
    <div id="approvedReviews" class="admin-list"></div>

    <h2>Rejected Reviews (<span id="rejectedCount">0</span>)</h2>
    <div id="rejectedReviews" class="admin-list"></div>
  </main>
  <script type="module">
    import { getPendingReviews, getApprovedReviews, getRejectedReviews, approveReview, rejectReview, deleteReview, formatReviewDate } from '../js/services/reviewService.js';

    function starsHtml(rating) {
      let s = '';
      for (let i = 1; i <= 5; i++) s += i <= rating ? '★' : '☆';
      return s;
    }
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
    function getStatus(review) {
      return review.status || (review.approved === true ? 'approved' : 'pending');
    }
    function statusLabel(status) {
      return status.charAt(0).toUpperCase() + status.slice(1);
    }
    function renderCard(r) {
      const by = [];
      if (r.name) by.push(r.name);
      if (r.company) by.push(r.company);
      const byline = by.length ? escapeHtml(by.join(', ')) : '—';
      const formattedDate = formatReviewDate(r.date || r.createdAt);
      const id = escapeHtml(String(r.id));
      const status = getStatus(r);
      const statusClass = escapeHtml(status);
      const statusLabelText = escapeHtml(statusLabel(status));
      let actions = '';
      if (status === 'pending') {
        actions = '<button type="button" class="btn-approve" data-action="approve">Approve</button>' +
          '<button type="button" class="btn-reject" data-action="reject">Reject</button>' +
          '<button type="button" class="btn-delete" data-action="delete">Delete</button>';
      } else if (status === 'approved') {
        actions = '<button type="button" class="btn-reject" data-action="reject">Reject</button>' +
          '<button type="button" class="btn-delete" data-action="delete">Delete</button>';
      } else {
        actions = '<button type="button" class="btn-approve" data-action="approve">Approve</button>' +
          '<button type="button" class="btn-delete" data-action="delete">Delete</button>';
      }
      return (
        '<div class="admin-card" data-id="' + id + '">' +
        '<div class="review-stars">' + starsHtml(r.rating) + '</div>' +
        '<p class="review-comment">' + escapeHtml(r.comment) + '</p>' +
        '<p class="review-meta">' + byline + '</p>' +
        (formattedDate ? '<p class="review-meta">Submitted: ' + formattedDate + '</p>' : '') +
        '<div class="review-status ' + statusClass + '">Status: ' + statusLabelText + '</div>' +
        '<div class="admin-actions">' + actions + '</div></div>'
      );
    }
    function renderList(containerId, reviews) {
      const el = document.getElementById(containerId);
      if (!el) return;
      if (reviews.length === 0) {
        el.innerHTML = '<p class="admin-empty">No reviews.</p>';
        return;
      }
      el.innerHTML = reviews.map((r) => renderCard(r)).join('');
      el.querySelectorAll('.admin-card').forEach((card) => {
        const id = card.getAttribute('data-id');
        const approveBtn = card.querySelector('[data-action="approve"]');
        const rejectBtn = card.querySelector('[data-action="reject"]');
        const deleteBtn = card.querySelector('[data-action="delete"]');
        if (approveBtn) approveBtn.addEventListener('click', () => { approveReview(id); render(); });
        if (rejectBtn) rejectBtn.addEventListener('click', () => { rejectReview(id); render(); });
        if (deleteBtn) deleteBtn.addEventListener('click', () => { deleteReview(id); render(); });
      });
    }
    function render() {
      const pending = getPendingReviews();
      const approved = getApprovedReviews();
      const rejected = getRejectedReviews();
      document.getElementById('pendingCount').textContent = pending.length;
      document.getElementById('approvedCount').textContent = approved.length;
      document.getElementById('rejectedCount').textContent = rejected.length;
      renderList('pendingReviews', pending);
      renderList('approvedReviews', approved);
      renderList('rejectedReviews', rejected);
    }
    render();

    // PWA: register service worker for installable admin app only
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/admin/admin-sw.js', { scope: '/admin/' }).catch(function () {});
    }
  </script>
</body>
</html>
