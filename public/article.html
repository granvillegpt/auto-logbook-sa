<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Article – Auto Logbook SA</title>
  <meta name="description" content="" />
  <meta property="og:title" content="Auto Logbook SA" />
  <meta property="og:description" content="" />
  <meta property="og:image" content="" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="/assets/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <style>
    body.landing-page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .article-page-wrap { max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; flex: 1; width: 100%; }
    .article-title { font-size: 2rem; margin: 0 0 12px; color: #0f172a; line-height: 1.2; }
    .article-byline { color: #64748b; font-size: 14px; margin: 0 0 24px; }
    .article-featured-wrap { margin: 0 0 24px; border-radius: 12px; overflow: hidden; background: #f1f5f9; }
    .article-featured-img { width: 100%; display: block; max-height: 380px; object-fit: cover; }
    .cms-body { line-height: 1.65; color: #334155; font-size: 17px; }
    .cms-body p { margin: 0 0 1em; }
    .cms-body h2 { font-size: 1.35rem; margin: 1.5em 0 0.5em; color: #0f172a; }
    .cms-body ul, .cms-body ol { margin: 0 0 1em 1.25em; }
    .article-not-found { text-align: center; padding: 60px 20px; color: #64748b; }
    .article-not-found a { color: #0f766e; }
    #articleDetail.hidden { display: none; }
    #articleNotFound.hidden { display: none; }
  </style>
</head>
<body class="landing-page">
  <header class="site-header site-header-landing">
    <div class="container header-inner">
      <a href="/index.html" class="brand"><img src="/assets/logos/auto_logbook_logo-white.png" alt="Auto Logbook SA" class="site-logo"></a>
      <button type="button" id="hamburgerBtn" class="hamburger-btn" aria-label="Open menu">☰</button>
      <nav class="site-nav nav-links" aria-label="Main">
        <a href="/index.html">Home</a>
        <a href="/resources.html">Articles</a>
        <a href="/index.html#how-it-works">How it Works</a>
      </nav>
    </div>
  </header>
  <main class="article-page-wrap">
    <p id="articleLoading" class="article-loading" style="color:#64748b;">Loading…</p>
    <article id="articleDetail" class="hidden"></article>
    <div id="articleNotFound" class="article-not-found hidden">
      <p>Article not found or not published.</p>
      <p><a href="/resources.html">← Back to Articles</a></p>
    </div>
  </main>
  <div id="site-footer"></div>
  <script>
fetch('/partials/footer.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('site-footer').innerHTML = html;
  });
</script>

  <div id="legal-modals-root"></div>
  <script src="/js/legal-modals.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-functions-compat.js"></script>
  <script src="/firebase/init.js"></script>
  <script src="/js/firebase-init.js"></script>
  <script src="/js/article-detail.js"></script>
</body>
</html>
